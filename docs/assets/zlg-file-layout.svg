<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1040" viewBox="0 0 760 1040" role="img" aria-labelledby="title desc">
  <title id="title">Vertical zlg archive layout</title>
  <desc id="desc">A zlg archive starts with a global header, then independent chunks. Each chunk has a chunk header, mesh-bigram summary and payload. A seekable directory and footer are written at the end.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#777"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="760" height="1040" fill="#fbfbfb"/>
  <text x="60" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222">.zlg archive layout</text>
  <text x="60" y="84" font-family="Arial, sans-serif" font-size="15" fill="#555">Independent searchable chunks with a seekable directory at the end.</text>

  <g filter="url(#shadow)">
    <rect x="160" y="120" width="440" height="72" rx="14" fill="#eef4ff" stroke="#6b8fd6" stroke-width="2"/>
    <text x="290" y="151" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#203864">Global header</text>
    <text x="245" y="175" font-family="Arial, sans-serif" font-size="13" fill="#333">magic, format version, flags</text>
  </g>

  <path d="M380 198 L380 232" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="100" y="240" width="560" height="210" rx="18" fill="#f0fff4" stroke="#54a36a" stroke-width="2"/>
    <text x="334" y="274" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#225d33">Chunk 0</text>
    <rect x="135" y="300" width="490" height="38" rx="8" fill="#ffffff" stroke="#8bcf99"/>
    <text x="286" y="324" font-family="Arial, sans-serif" font-size="14" fill="#222">chunk header: line count, bytes, mode, CRC</text>
    <rect x="135" y="350" width="490" height="38" rx="8" fill="#ffffff" stroke="#8bcf99"/>
    <text x="261" y="374" font-family="Arial, sans-serif" font-size="14" fill="#222">mesh-bigram summary: skip filter</text>
    <rect x="135" y="400" width="490" height="38" rx="8" fill="#ffffff" stroke="#8bcf99"/>
    <text x="266" y="424" font-family="Arial, sans-serif" font-size="14" fill="#222">payload: stored or zstd-compressed lines</text>
  </g>

  <path d="M380 456 L380 490" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="100" y="498" width="560" height="210" rx="18" fill="#f0fff4" stroke="#54a36a" stroke-width="2"/>
    <text x="334" y="532" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#225d33">Chunk 1</text>
    <rect x="135" y="558" width="490" height="38" rx="8" fill="#ffffff" stroke="#8bcf99"/>
    <text x="286" y="582" font-family="Arial, sans-serif" font-size="14" fill="#222">chunk header: line count, bytes, mode, CRC</text>
    <rect x="135" y="608" width="490" height="38" rx="8" fill="#ffffff" stroke="#8bcf99"/>
    <text x="261" y="632" font-family="Arial, sans-serif" font-size="14" fill="#222">mesh-bigram summary: skip filter</text>
    <rect x="135" y="658" width="490" height="38" rx="8" fill="#ffffff" stroke="#8bcf99"/>
    <text x="266" y="682" font-family="Arial, sans-serif" font-size="14" fill="#222">payload: stored or zstd-compressed lines</text>
  </g>

  <path d="M380 714 L380 748" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="361" y="780" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#777">...</text>
  <path d="M380 792 L380 826" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="160" y="834" width="440" height="82" rx="14" fill="#fff8e8" stroke="#d5a742" stroke-width="2"/>
    <text x="326" y="867" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6b4a00">Directory</text>
    <text x="220" y="892" font-family="Arial, sans-serif" font-size="13" fill="#333">chunk offsets, line counts, byte counts, summary lengths</text>
  </g>

  <path d="M380 922 L380 956" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="160" y="964" width="440" height="58" rx="14" fill="#fff0f0" stroke="#d66b6b" stroke-width="2"/>
    <text x="354" y="998" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#7a2727">Footer</text>
    <text x="258" y="1018" font-family="Arial, sans-serif" font-size="13" fill="#333">archive totals and directory location</text>
  </g>
</svg>
