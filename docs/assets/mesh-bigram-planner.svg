<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-labelledby="title desc">
  <title id="title">Mesh-bigram search planning</title>
  <desc id="desc">zlg turns literals into 3-byte mesh edges, compares those edges to per-chunk summaries, skips chunks that cannot match and decodes only candidates.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#777"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="980" height="760" fill="#fbfbfb"/>
  <text x="44" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222">Mesh-bigram planner</text>
  <text x="44" y="80" font-family="Arial, sans-serif" font-size="15" fill="#555">A compact per-chunk edge set lets zlg reject impossible chunks before decompression.</text>

  <g filter="url(#shadow)">
    <rect x="44" y="120" width="255" height="126" rx="16" fill="#eef4ff" stroke="#6b8fd6" stroke-width="2"/>
    <text x="74" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#203864">1. Pattern selector</text>
    <text x="74" y="182" font-family="Arial, sans-serif" font-size="14" fill="#222">regex: error|warn|fail</text>
    <text x="74" y="206" font-family="Arial, sans-serif" font-size="14" fill="#222">literal selector: error</text>
    <text x="74" y="230" font-family="Arial, sans-serif" font-size="13" fill="#555">fixed strings use the full literal</text>
  </g>

  <path d="M299 183 L355 183" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="365" y="120" width="250" height="126" rx="16" fill="#f8f4ff" stroke="#9c7bd6" stroke-width="2"/>
    <text x="397" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#4b2e83">2. Bigrams</text>
    <text x="397" y="182" font-family="Arial, sans-serif" font-size="14" fill="#222">error -> er rr ro or</text>
    <text x="397" y="206" font-family="Arial, sans-serif" font-size="14" fill="#222">adjacent byte pairs</text>
    <text x="397" y="230" font-family="Arial, sans-serif" font-size="13" fill="#555">order matters for search clues</text>
  </g>

  <path d="M615 183 L671 183" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="681" y="120" width="255" height="126" rx="16" fill="#fff8e8" stroke="#d5a742" stroke-width="2"/>
    <text x="713" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6b4a00">3. Mesh edges</text>
    <text x="713" y="182" font-family="Arial, sans-serif" font-size="14" fill="#222">err  rro  ror</text>
    <text x="713" y="206" font-family="Arial, sans-serif" font-size="14" fill="#222">3-byte windows connect</text>
    <text x="713" y="230" font-family="Arial, sans-serif" font-size="13" fill="#555">one bigram to the next</text>
  </g>

  <path d="M808 252 L808 300" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="252" y="306" width="478" height="90" rx="16" fill="#f0fff4" stroke="#54a36a" stroke-width="2"/>
    <text x="315" y="338" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#225d33">4. Check each chunk summary</text>
    <text x="315" y="366" font-family="Arial, sans-serif" font-size="14" fill="#222">Summary contains sorted, deduplicated mesh edges for that chunk.</text>
  </g>

  <path d="M491 402 L491 440" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="58" y="448" width="260" height="118" rx="16" fill="#fff0f0" stroke="#d66b6b" stroke-width="2"/>
    <text x="96" y="482" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7a2727">Chunk A: skip</text>
    <text x="96" y="512" font-family="Arial, sans-serif" font-size="14" fill="#222">missing required edge</text>
    <text x="96" y="536" font-family="Arial, sans-serif" font-size="13" fill="#555">payload is not decoded</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="448" width="260" height="118" rx="16" fill="#f0fff4" stroke="#54a36a" stroke-width="2"/>
    <text x="398" y="482" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#225d33">Chunk B: candidate</text>
    <text x="398" y="512" font-family="Arial, sans-serif" font-size="14" fill="#222">all required edges present</text>
    <text x="398" y="536" font-family="Arial, sans-serif" font-size="13" fill="#555">decode and run real matcher</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="662" y="448" width="260" height="118" rx="16" fill="#fff0f0" stroke="#d66b6b" stroke-width="2"/>
    <text x="700" y="482" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7a2727">Chunk C: skip</text>
    <text x="700" y="512" font-family="Arial, sans-serif" font-size="14" fill="#222">missing required edge</text>
    <text x="700" y="536" font-family="Arial, sans-serif" font-size="13" fill="#555">payload is not decoded</text>
  </g>

  <path d="M490 572 L490 618" stroke="#777" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="260" y="626" width="460" height="84" rx="16" fill="#eef4ff" stroke="#6b8fd6" stroke-width="2"/>
    <text x="338" y="659" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#203864">5. Match selected lines normally</text>
    <text x="307" y="688" font-family="Arial, sans-serif" font-size="14" fill="#222">The summary is a filter, not proof. Real grep/regex/PCRE2 matching decides.</text>
  </g>
</svg>
